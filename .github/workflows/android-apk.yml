name: Android APK Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce npm public registry
        run: |
          npm config set registry https://registry.npmjs.org/
          echo "NPM registry: $(npm config get registry)"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ensure native Android project exists
        run: |
          if [ -d android ]; then
            echo "mobile-app/android exists. Skipping generation."
            exit 0
          fi

          echo "mobile-app/android is missing. Generating with Expo prebuild..."
          set +e
          CI=1 npx expo prebuild --platform android 2>&1 | tee /tmp/expo-prebuild.log
          PREBUILD_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$PREBUILD_EXIT" -ne 0 ] || [ ! -d android ]; then
            echo "Expo prebuild failed or android/ was not created."
            echo "Root cause excerpt:"
            grep -E "(npm error|Failed to create the native directory|expo-template-bare-minimum|403 Forbidden)" /tmp/expo-prebuild.log || true
            exit 1
          fi

      - name: Force standalone JS bundle settings
        run: |
          if [ ! -f android/app/build.gradle ]; then
            echo "android/app/build.gradle not found"
            exit 1
          fi

          if grep -q "bundleInDebug: true" android/app/build.gradle; then
            echo "bundleInDebug already enabled"
          else
            {
              echo
              echo 'project.ext.react = ['
              echo '    bundleInDebug: true,'
              echo '    bundleInRelease: true'
              echo ']'
            } >> android/app/build.gradle
            echo "Injected bundleInDebug/bundleInRelease settings"
          fi

      - name: Build standalone APKs
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Verify JS bundle packaged in APK
        run: |
          DEBUG_APK=android/app/build/outputs/apk/debug/app-debug.apk
          RELEASE_APK=android/app/build/outputs/apk/release/app-release-unsigned.apk

          for apk in "$DEBUG_APK" "$RELEASE_APK"; do
            if [ ! -f "$apk" ]; then
              echo "Missing APK: $apk"
              exit 1
            fi

            if unzip -l "$apk" | grep -q "assets/index.android.bundle"; then
              echo "Verified bundle in $apk"
            else
              echo "index.android.bundle missing in $apk"
              exit 1
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsa-global-internal-standalone-apks
          path: |
            mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
            mobile-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
