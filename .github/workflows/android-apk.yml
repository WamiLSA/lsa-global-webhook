name: Android APK Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce npm public registry
        run: |
          npm config set registry https://registry.npmjs.org/
          echo "NPM registry: $(npm config get registry)"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ensure native Android project exists
        run: |
          if [ -d android ]; then
            echo "mobile-app/android exists. Skipping generation."
            exit 0
          fi

          echo "mobile-app/android is missing. Generating with Expo prebuild..."
          set +e
          CI=1 npx expo prebuild --platform android 2>&1 | tee /tmp/expo-prebuild.log
          PREBUILD_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$PREBUILD_EXIT" -ne 0 ] || [ ! -d android ]; then
            echo "Expo prebuild failed or android/ was not created."
            echo "Root cause excerpt:"
            grep -E "(npm error|Failed to create the native directory|expo-template-bare-minimum|403 Forbidden)" /tmp/expo-prebuild.log || true
            exit 1
          fi

      - name: Force standalone JS bundle settings
        run: |
          if [ ! -f android/app/build.gradle ]; then
            echo "android/app/build.gradle not found"
            exit 1
          fi

          python - <<'PY2'
from pathlib import Path
import re

p = Path('android/app/build.gradle')
s = p.read_text()

if re.search(r'react\s*\{', s):
    s2, n = re.subn(
        r'(react\s*\{)(.*?)(\n\})',
        lambda m: (
            m.group(1)
            + re.sub(r'\n\s*debuggableVariants\s*=\s*\[[^\]]*\]\s*', '\n', m.group(2), flags=re.S)
            + '\n    debuggableVariants = []\n'
            + m.group(3)
        ),
        s,
        count=1,
        flags=re.S,
    )
    if n == 0:
        raise SystemExit('Failed to update existing react {} block')
    s = s2
    p.write_text(s)
    print('Updated react {} with debuggableVariants = []')
else:
    anchor = 'android {'
    if anchor not in s:
        raise SystemExit('Could not find android { to insert react {} block')
    block = 'react {\n    debuggableVariants = []\n}\n\n'
    s = s.replace(anchor, block + anchor, 1)
    p.write_text(s)
    print('Inserted react {} with debuggableVariants = []')
PY2

      - name: Build standalone APKs
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign release APK for installation
        run: |
          UNSIGNED_APK=android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED_APK=android/app/build/outputs/apk/release/app-release.apk
          KEYSTORE_PATH=$HOME/debug-release.keystore

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "Missing APK: $UNSIGNED_APK"
            exit 1
          fi

          keytool -genkeypair             -alias androiddebugkey             -keyalg RSA             -keysize 2048             -validity 10000             -storepass android             -keypass android             -keystore "$KEYSTORE_PATH"             -dname "CN=Android Debug,O=Android,C=US"

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n 1)
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found"
            exit 1
          fi

          "$APKSIGNER" sign             --ks "$KEYSTORE_PATH"             --ks-pass pass:android             --key-pass pass:android             --ks-key-alias androiddebugkey             --out "$SIGNED_APK"             "$UNSIGNED_APK"

          "$APKSIGNER" verify "$SIGNED_APK"

      - name: Verify JS bundle packaged in standalone APK
        run: |
          RELEASE_APK=android/app/build/outputs/apk/release/app-release.apk

          if [ ! -f "$RELEASE_APK" ]; then
            echo "Missing APK: $RELEASE_APK"
            exit 1
          fi

          if unzip -l "$RELEASE_APK" | grep -q "assets/index.android.bundle"; then
            echo "Verified bundle in $RELEASE_APK"
          else
            echo "index.android.bundle missing in $RELEASE_APK"
            exit 1
          fi

      - name: Upload standalone APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsa-global-internal-standalone-release-apk
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
