name: Android APK Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Validate npm registry config
        run: |
          echo "npm registry: $(npm config get registry)"
          npm config delete proxy || true
          npm config delete https-proxy || true
          npm config set registry https://registry.npmjs.org/
          echo "npm registry (normalized): $(npm config get registry)"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify checked-in Android project
        run: |
          if [ ! -f android/gradlew ]; then
            echo "ERROR: mobile-app/android is missing."
            echo "Run once locally: cd mobile-app && CI=1 npx expo prebuild --platform android"
            echo "Commit the generated mobile-app/android directory, then rerun CI."
            exit 1
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsa-global-internal-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
