name: Android APK Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce npm public registry
        run: |
          npm config set registry https://registry.npmjs.org/
          echo "NPM registry: $(npm config get registry)"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify native Android project exists
        run: |
          if [ ! -d android ]; then
            echo "mobile-app/android is missing."
            echo "Generate it once in a trusted environment and commit it:"
            echo "  cd mobile-app"
            echo "  npm config set registry https://registry.npmjs.org/"
            echo "  CI=1 npx expo prebuild --platform android"
            exit 1
          fi

      - name: Build debug APK from checked-in android project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsa-global-internal-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
