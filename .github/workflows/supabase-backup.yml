name: Supabase Backup Readiness

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - preflight
          - backup
        default: preflight
  schedule:
    # Weekly Sunday 03:30 UTC. Disable by removing this block or setting this workflow inactive.
    - cron: "30 3 * * 0"

permissions:
  contents: read

jobs:
  backup-readiness:
    name: Backup Readiness Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORKFLOW_FILE: .github/workflows/supabase-backup.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve execution mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.mode }}"
          else
            MODE="backup"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "PASS: Selected mode is '$MODE'."

      - name: Preflight checks (safe dry-run)
        if: ${{ steps.mode.outputs.mode == 'preflight' }}
        shell: bash
        run: |
          set -euo pipefail

          pass() {
            echo "PASS: $1"
          }

          warn() {
            echo "WARN: $1"
            WARNINGS+=("$1")
          }

          fail_critical() {
            echo "FAIL: $1"
            CRITICAL_FAILURES+=("$1")
          }

          has_line() {
            local regex="$1"
            local file="$2"
            if [[ ! -f "$file" ]]; then
              return 1
            fi
            grep -Eq "$regex" "$file"
          }

          has_any_line() {
            local file="$1"
            shift
            if [[ ! -f "$file" ]]; then
              return 1
            fi
            local regex
            for regex in "$@"; do
              if grep -Eq "$regex" "$file"; then
                return 0
              fi
            done
            return 1
          }

          has_secret_print_command() {
            local file="$1"
            if [[ ! -f "$file" ]]; then
              return 1
            fi

            grep -Eq '^[[:space:]]*(echo|printf)\b.*(^|[^\\])\$SUPABASE_DB_URL([^[:alnum:]_]|$)' "$file" \
              || grep -Eq '^[[:space:]]*(echo|printf)\b.*(^|[^\\])\$\{SUPABASE_DB_URL\}' "$file"
          }

          has_apparent_connection_string_print_command() {
            local file="$1"
            if [[ ! -f "$file" ]]; then
              return 1
            fi

            grep -Eq '^[[:space:]]*(echo|printf)\b.*postgres(ql)?://' "$file"
          }

          WARNINGS=()
          CRITICAL_FAILURES=()

          if [[ -f scripts/supabase-manual-backup.sh ]]; then
            pass "Backup script exists."
          else
            fail_critical "Backup script is missing: scripts/supabase-manual-backup.sh"
          fi

          if [[ -f scripts/supabase-manual-backup.sh ]]; then
            if [[ -x scripts/supabase-manual-backup.sh ]]; then
              pass "Backup script is executable."
            else
              TMP_SCRIPT="${RUNNER_TEMP}/supabase-manual-backup-preflight.sh"
              cp scripts/supabase-manual-backup.sh "$TMP_SCRIPT"
              if chmod +x "$TMP_SCRIPT"; then
                pass "Backup script is not executable in git metadata, but CI can make it executable safely."
              else
                fail_critical "Backup script is not executable and CI could not apply chmod safely."
              fi
            fi
          fi

          for runbook in \
            docs/operations/automated-supabase-backup-readiness.md \
            docs/operations/supabase-manual-backup-plan.md \
            docs/operations/first-real-backup-checklist.md; do
            if [[ -f "$runbook" ]]; then
              pass "Runbook exists: $runbook"
            else
              warn "Runbook missing: $runbook"
            fi
          done

          if [[ ! -f .gitignore ]]; then
            fail_critical ".gitignore file is missing."
          else
            has_any_line .gitignore '^backups/$' '^/backups/$' || fail_critical ".gitignore missing backups/ protection."
            has_any_line .gitignore '^backups/manual/$' '^/backups/manual/$' || fail_critical ".gitignore missing backups/manual/ protection."
            has_any_line .gitignore '^backups/\*\*/\*\.sql$' '^/backups/\*\*/\*\.sql$' || fail_critical ".gitignore missing backups/**/*.sql protection."
            has_any_line .gitignore '^backups/\*\*/\*\.tar\.gz$' '^/backups/\*\*/\*\.tar\.gz$' || fail_critical ".gitignore missing backups/**/*.tar.gz protection."
            has_any_line .gitignore '^backups/\*\*/\*\.sha256$' '^/backups/\*\*/\*\.sha256$' || fail_critical ".gitignore missing backups/**/*.sha256 protection."
            has_line '^\*\.sql$' .gitignore || fail_critical ".gitignore missing *.sql protection."
            has_line '^\*\.dump$' .gitignore || fail_critical ".gitignore missing *.dump protection."
            has_line '^\*\.backup$' .gitignore || fail_critical ".gitignore missing *.backup protection."
            has_line '^\.env$' .gitignore || fail_critical ".gitignore missing .env protection."
            has_line '^\.env\.\*$' .gitignore || fail_critical ".gitignore missing .env.* protection."
            has_any_line .gitignore '^local-uploads/$' '^/local-uploads/$' || fail_critical ".gitignore missing local-uploads/ protection."
            has_any_line .gitignore '^uploads/$' '^/uploads/$' || fail_critical ".gitignore missing uploads/ protection."
            has_any_line .gitignore '^provider-documents/$' '^/provider-documents/$' || fail_critical ".gitignore missing provider-documents/ protection."
            has_any_line .gitignore '^client-documents/$' '^/client-documents/$' || fail_critical ".gitignore missing client-documents/ protection."
            pass ".gitignore validation completed."
          fi

          if [[ -f "$WORKFLOW_FILE" ]]; then
            pass "Workflow file exists: $WORKFLOW_FILE"
          else
            fail_critical "Workflow file missing: $WORKFLOW_FILE"
          fi

          if [[ -f "$WORKFLOW_FILE" ]]; then
            has_line 'workflow_dispatch:' "$WORKFLOW_FILE" || fail_critical "workflow_dispatch trigger missing."
            has_line 'inputs:' "$WORKFLOW_FILE" || fail_critical "Workflow inputs section missing."
            has_line 'mode:' "$WORKFLOW_FILE" || fail_critical "Mode input missing."
            has_line "steps\\.mode\\.outputs\\.mode == 'preflight'" "$WORKFLOW_FILE" || fail_critical "Preflight branch logic missing."
            has_line "steps\\.mode\\.outputs\\.mode == 'backup'" "$WORKFLOW_FILE" || fail_critical "Backup branch logic missing."
            has_line 'scripts/supabase-manual-backup\.sh' "$WORKFLOW_FILE" || fail_critical "Backup script execution logic missing from workflow."
            has_line 'sha256sum' "$WORKFLOW_FILE" || warn "Checksum logic not detected. Backup evidence quality may be reduced."
            has_line 'secrets\.SUPABASE_DB_URL' "$WORKFLOW_FILE" || fail_critical "Required database backup secret handling is missing from workflow."
            has_line "Validate required secret is configured" "$WORKFLOW_FILE" || fail_critical "Backup secret validation step missing."
            pass "Workflow backup mode logic validation completed."
          fi

          if has_line '(^|[[:space:]])set -x([[:space:]]|$)' "$WORKFLOW_FILE"; then
            fail_critical "Workflow contains shell xtrace (set -x), which can leak sensitive runtime data."
          else
            pass "Workflow does not enable shell xtrace."
          fi

          if has_secret_print_command "$WORKFLOW_FILE"; then
            fail_critical "Workflow appears to print the database backup secret variable."
          else
            pass "Workflow does not print the database backup secret variable."
          fi

          if has_line '(^|[[:space:]])set -x([[:space:]]|$)' scripts/supabase-manual-backup.sh; then
            fail_critical "Backup script contains shell xtrace (set -x), which can leak sensitive runtime data."
          else
            pass "Backup script does not enable shell xtrace."
          fi

          if has_secret_print_command scripts/supabase-manual-backup.sh; then
            fail_critical "Backup script appears to print the database backup secret variable."
          else
            pass "Backup script does not print the database backup secret variable."
          fi

          if has_apparent_connection_string_print_command "$WORKFLOW_FILE" \
            || has_apparent_connection_string_print_command scripts/supabase-manual-backup.sh; then
            warn "Workflow or backup script appears to print a database connection string, but exposure could not be proven from static preflight checks."
          else
            pass "Workflow and backup script do not print database connection strings."
          fi

          if has_line 'SUPABASE_DB_URL: \${\{ secrets\.SUPABASE_DB_URL \}\}' "$WORKFLOW_FILE" \
             && has_line "steps\\.mode\\.outputs\\.mode == 'backup'" "$WORKFLOW_FILE"; then
            pass "Database backup secret is scoped to backup mode."
          else
            fail_critical "Database backup secret scope is unsafe or missing."
          fi

          STATUS="PASS"
          if [[ ${#CRITICAL_FAILURES[@]} -gt 0 ]]; then
            STATUS="FAIL"
          elif [[ ${#WARNINGS[@]} -gt 0 ]]; then
            STATUS="WARN"
          fi

          {
            echo "## Backup Readiness Result"
            echo "- status: $STATUS"
            echo "- mode: preflight"
            echo "- checks:"
            echo "  - preflight performs file and workflow validation only"
            echo "  - no Supabase connection attempted"
            echo "  - no SQL dump command executed"
            echo "  - no backup artifacts generated"
            if [[ ${#WARNINGS[@]} -gt 0 ]]; then
              echo "- warnings:"
              for item in "${WARNINGS[@]}"; do
                echo "  - $item"
              done
            fi
            if [[ ${#CRITICAL_FAILURES[@]} -gt 0 ]]; then
              echo "- critical_failures:"
              for item in "${CRITICAL_FAILURES[@]}"; do
                echo "  - $item"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ ${#CRITICAL_FAILURES[@]} -gt 0 ]]; then
            exit 1
          fi

          echo "PREFLIGHT COMPLETE: SAFE TO PROCEED TO SECRET CONFIGURATION WHEN READY."

      - name: Validate required secret is configured
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        shell: bash
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_DB_URL:-}" ]]; then
            echo "FAIL: Required database backup secret is missing."
            echo "Set the required database backup secret in GitHub Secrets, then re-run this workflow in backup mode."
            exit 1
          fi
          echo "PASS: Required secret detected (value hidden)."

      - name: Install Supabase CLI
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare temporary backup directory
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +"%Y%m%dT%H%M%SZ")"
          BACKUP_DIR="${RUNNER_TEMP}/supabase-backup-${TS}"
          ARCHIVE="${RUNNER_TEMP}/supabase-backup-${TS}.tar.gz"
          REPORT="${RUNNER_TEMP}/supabase-backup-report-${TS}.txt"
          CHECKSUMS="${RUNNER_TEMP}/supabase-backup-${TS}.sha256"
          mkdir -p "$BACKUP_DIR"
          {
            echo "timestamp=$TS"
            echo "backup_dir=$BACKUP_DIR"
            echo "archive_path=$ARCHIVE"
            echo "report_path=$REPORT"
            echo "checksums_path=$CHECKSUMS"
          } >> "$GITHUB_OUTPUT"
          echo "PASS: Temporary backup workspace created in runner temp storage."

      - name: Run backup script
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        shell: bash
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          SUPABASE_BACKUP_DIR="${{ steps.prep.outputs.backup_dir }}" ./scripts/supabase-manual-backup.sh
          echo "PASS: Backup script completed."

      - name: Validate expected files exist
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        shell: bash
        run: |
          set -euo pipefail
          BACKUP_DIR="${{ steps.prep.outputs.backup_dir }}"
          for file in roles.sql schema.sql data.sql; do
            if [[ ! -s "$BACKUP_DIR/$file" ]]; then
              echo "FAIL: Missing or empty backup file: $file"
              exit 1
            fi
          done
          echo "PASS: roles.sql, schema.sql, and data.sql were generated."

      - name: Build archive and checksums
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        shell: bash
        run: |
          set -euo pipefail
          BACKUP_DIR="${{ steps.prep.outputs.backup_dir }}"
          ARCHIVE_PATH="${{ steps.prep.outputs.archive_path }}"
          CHECKSUMS_PATH="${{ steps.prep.outputs.checksums_path }}"

          tar -C "$(dirname "$BACKUP_DIR")" -czf "$ARCHIVE_PATH" "$(basename "$BACKUP_DIR")"

          sha256sum \
            "$BACKUP_DIR/roles.sql" \
            "$BACKUP_DIR/schema.sql" \
            "$BACKUP_DIR/data.sql" \
            "$ARCHIVE_PATH" > "$CHECKSUMS_PATH"

          echo "PASS: Archive and checksums created."

      - name: Generate safe backup report
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        shell: bash
        run: |
          set -euo pipefail
          TS="${{ steps.prep.outputs.timestamp }}"
          BACKUP_DIR="${{ steps.prep.outputs.backup_dir }}"
          ARCHIVE_PATH="${{ steps.prep.outputs.archive_path }}"
          CHECKSUMS_PATH="${{ steps.prep.outputs.checksums_path }}"
          REPORT_PATH="${{ steps.prep.outputs.report_path }}"

          {
            echo "Supabase Backup Readiness Report"
            echo "timestamp_utc: $TS"
            echo "git_commit_sha: ${GITHUB_SHA}"
            echo
            echo "files:"
            for target in "$BACKUP_DIR/roles.sql" "$BACKUP_DIR/schema.sql" "$BACKUP_DIR/data.sql" "$ARCHIVE_PATH"; do
              printf -- "- %s | %s bytes\n" "$(basename "$target")" "$(wc -c < "$target")"
            done
            echo
            echo "sha256:"
            while IFS= read -r line; do
              file_name="$(basename "${line#* }")"
              hash_value="${line%% *}"
              printf -- "- %s | %s\n" "$file_name" "$hash_value"
            done < "$CHECKSUMS_PATH"
          } > "$REPORT_PATH"

          cat "$REPORT_PATH"

          {
            echo "## Backup Readiness Result"
            echo "- status: PASS"
            echo "- mode: backup"
            echo "- timestamp_utc: $TS"
            echo "- git_commit_sha: ${GITHUB_SHA}"
            echo "- note: Real backup files remain in runner temp storage only and are not uploaded or committed."
            echo ""
            echo "### Safe Report"
            cat "$REPORT_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Storage publishing policy (safe default)
        if: ${{ steps.mode.outputs.mode == 'backup' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "PASS: Publishing disabled by default."
          echo "No upload, no commit, and no external transfer occurs in this workflow."
          echo "Enable publishing only after repository privacy and storage approval are explicitly confirmed."
