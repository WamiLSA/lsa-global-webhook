<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LSA GLOBAL Knowledge Capture Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background: #f7f7f7;
    }

    #left {
      width: 40%;
      border-right: 1px solid #ddd;
      background: #fff;
      overflow-y: auto;
      padding: 16px;
      box-sizing: border-box;
    }

    #right {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      box-sizing: border-box;
    }

    h2, h3 { margin-top: 0; }

    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 14px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .answer {
      white-space: pre-wrap;
      margin-top: 8px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .topbar a {
      text-decoration: none;
      background: #fff;
      border: 1px solid #ddd;
      padding: 8px 12px;
      border-radius: 8px;
      color: #000;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      width: auto;
      flex: 1;
    }

    .edit-mode {
      background: #fff8dc;
    }
  </style>
</head>
<body>
  <div id="left">
    <div class="topbar">
      <a href="/inbox">Inbox</a>
      <a href="/kb">KB</a>
      <a href="/providers">Providers</a>
      <a href="/logout">Logout</a>
    </div>

    <h2>Knowledge Capture Assistant</h2>

    <div class="card" id="captureFormCard">
      <h3 id="formTitle">Capture New Knowledge</h3>

      <input id="title" placeholder="Optional title" />
      <input id="raw_question" placeholder="Original question (optional)" />
      <textarea id="raw_answer" placeholder="Raw answer / explanation / useful human response"></textarea>
      <input id="suggested_category" placeholder="Suggested category" />
      <input id="audience" placeholder="Audience (client, student, partner, staff)" />

      <select id="source_channel">
        <option value="manual">manual</option>
        <option value="inbox">inbox</option>
        <option value="email">email</option>
        <option value="whatsapp">whatsapp</option>
        <option value="website">website</option>
        <option value="staff">staff</option>
      </select>

      <input id="source_reference" placeholder="Source reference (optional)" />

      <select id="status">
        <option value="pending">pending</option>
        <option value="reviewed">reviewed</option>
        <option value="approved">approved</option>
        <option value="converted">converted</option>
      </select>
      
      <textarea id="notes" placeholder="Notes"></textarea>
      <div class="card" id="aiSuggestionCard" style="display:none;">
  <h3>AI Suggestion Preview</h3>
  <div class="small"><strong>Title:</strong> <span id="preview_title"></span></div>
  <div class="small"><strong>Improved Question:</strong> <span id="preview_question"></span></div>
  <div class="small"><strong>Keywords:</strong> <span id="preview_keywords"></span></div>
  <div class="small"><strong>Audience:</strong> <span id="preview_audience"></span></div>
  <div class="small"><strong>Suggested Category:</strong> <span id="preview_category"></span></div>
  <div class="small"><strong>New Category Suggestion:</strong> <span id="preview_new_category"></span></div>
  <div class="answer" id="preview_answer"></div>
</div>
      <button onclick="generateStructuredKnowledge()">Generate Structured Knowledge</button>
      <button id="saveBtn" onclick="createOrUpdateCapture()">Save Capture</button>
      <button id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
    </div>
  </div>

  <div id="right">
    <h2>Captured Knowledge</h2>
    <input id="searchBox" placeholder="Search title, question, answer, category..." oninput="renderCaptures()" />
    <div id="captures"></div>
  </div>

  <script>
    let captures = [];
    let editingId = null;

    async function loadCaptures() {
      const res = await fetch("/api/kb-capture");
      const data = await res.json();
      captures = Array.isArray(data) ? data : [];
      renderCaptures();
    }

    function renderCaptures() {
      const search = document.getElementById("searchBox").value.toLowerCase().trim();
      const container = document.getElementById("captures");
      container.innerHTML = "";

      const filtered = captures.filter(item => {
        const haystack = [
          item.title || "",
          item.raw_question || "",
          item.raw_answer || "",
          item.suggested_category || "",
          item.audience || "",
          item.source_channel || "",
          item.notes || ""
        ].join(" ").toLowerCase();

        return !search || haystack.includes(search);
      });

      filtered.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="title">${item.title || "Untitled Capture"}</div>
          <div class="small">
            Category: ${item.suggested_category || ""} |
            Audience: ${item.audience || ""} |
            Source: ${item.source_channel || ""} |
            Status: ${item.status || ""}
          </div>
          <div class="small">Question: ${item.raw_question || ""}</div>
          <div class="small">Reference: ${item.source_reference || ""}</div>
          <div class="answer">${item.raw_answer || ""}</div>
          <div class="small">${item.notes || ""}</div>
          <div class="actions">
            <button onclick="editCapture(${item.id})">Edit</button>
            <button onclick="deleteCapture(${item.id})">Delete</button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    async function createOrUpdateCapture() {
      const payload = {
        title: document.getElementById("title").value.trim(),
        raw_question: document.getElementById("raw_question").value.trim(),
        raw_answer: document.getElementById("raw_answer").value.trim(),
        suggested_category: document.getElementById("suggested_category").value.trim(),
        audience: document.getElementById("audience").value.trim(),
        source_channel: document.getElementById("source_channel").value,
        source_reference: document.getElementById("source_reference").value.trim(),
        status: document.getElementById("status").value,
        notes: document.getElementById("notes").value.trim()
      };

      let res;

      if (editingId) {
        res = await fetch(`/api/kb-capture/${editingId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch("/api/kb-capture", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      }

      const result = await res.json();

      if (!res.ok) {
        alert("Save failed: " + JSON.stringify(result));
        return;
      }

      clearForm();
      await loadCaptures();
    }

    function editCapture(id) {
      const item = captures.find(c => c.id === id);
      if (!item) return;

      editingId = id;
      document.getElementById("formTitle").textContent = "Edit Capture";
      document.getElementById("captureFormCard").classList.add("edit-mode");
      document.getElementById("saveBtn").textContent = "Update Capture";
      document.getElementById("cancelEditBtn").style.display = "block";

      document.getElementById("title").value = item.title || "";
      document.getElementById("raw_question").value = item.raw_question || "";
      document.getElementById("raw_answer").value = item.raw_answer || "";
      document.getElementById("suggested_category").value = item.suggested_category || "";
      document.getElementById("audience").value = item.audience || "";
      document.getElementById("source_channel").value = item.source_channel || "manual";
      document.getElementById("source_reference").value = item.source_reference || "";
      document.getElementById("status").value = item.status || "pending";
      document.getElementById("notes").value = item.notes || "";
    }

    function cancelEdit() {
      clearForm();
    }

    function clearForm() {
      editingId = null;
      document.getElementById("formTitle").textContent = "Capture New Knowledge";
      document.getElementById("captureFormCard").classList.remove("edit-mode");
      document.getElementById("saveBtn").textContent = "Save Capture";
      document.getElementById("cancelEditBtn").style.display = "none";

      document.getElementById("title").value = "";
      document.getElementById("raw_question").value = "";
      document.getElementById("raw_answer").value = "";
      document.getElementById("suggested_category").value = "";
      document.getElementById("audience").value = "";
      document.getElementById("source_channel").value = "manual";
      document.getElementById("source_reference").value = "";
      document.getElementById("status").value = "pending";
      document.getElementById("notes").value = "";
    }

    async function deleteCapture(id) {
      const confirmed = confirm("Delete this captured knowledge?");
      if (!confirmed) return;

      const res = await fetch(`/api/kb-capture/${id}`, {
        method: "DELETE"
      });

      const result = await res.json();

      if (!res.ok) {
        alert("Delete failed: " + JSON.stringify(result));
        return;
      }

      if (editingId === id) {
        clearForm();
      }

      await loadCaptures();
    }
 async function generateStructuredKnowledge() {
  const raw_question = document.getElementById("raw_question").value.trim();
  const raw_answer = document.getElementById("raw_answer").value.trim();

  const res = await fetch("/api/kb-capture/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      raw_question,
      raw_answer
    })
  });

  const result = await res.json();

  if (!res.ok) {
    alert("Generation failed: " + JSON.stringify(result));
    return;
  }

  const data = result.result || {};

  document.getElementById("title").value = data.title || "";
  document.getElementById("raw_question").value = data.improved_question || raw_question;
  document.getElementById("raw_answer").value = data.improved_answer || raw_answer;
  document.getElementById("suggested_category").value = data.suggested_category || "";
  document.getElementById("audience").value = data.audience || "";
  document.getElementById("notes").value =
    (document.getElementById("notes").value ? document.getElementById("notes").value + "\n\n" : "") +
    "Keywords: " + (data.keywords || "") +
    (data.new_category_suggestion ? "\nNew category suggestion: " + data.new_category_suggestion : "");

  document.getElementById("preview_title").textContent = data.title || "";
  document.getElementById("preview_question").textContent = data.improved_question || "";
  document.getElementById("preview_keywords").textContent = data.keywords || "";
  document.getElementById("preview_audience").textContent = data.audience || "";
  document.getElementById("preview_category").textContent = data.suggested_category || "";
  document.getElementById("preview_new_category").textContent = data.new_category_suggestion || "";
  document.getElementById("preview_answer").textContent = data.improved_answer || "";

  document.getElementById("aiSuggestionCard").style.display = "block";
}
    loadCaptures();
  </script>
</body>
</html>
