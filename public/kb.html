<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LSA GLOBAL Knowledge Base Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background: #f7f7f7;
    }

    #left {
      width: 38%;
      border-right: 1px solid #ddd;
      background: #fff;
      overflow-y: auto;
      padding: 16px;
      box-sizing: border-box;
    }

    #right {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      box-sizing: border-box;
    }

    h2, h3 {
      margin-top: 0;
    }

    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .answer {
      white-space: pre-wrap;
      margin-top: 8px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .topbar a {
      text-decoration: none;
      background: #fff;
      border: 1px solid #ddd;
      padding: 8px 12px;
      border-radius: 8px;
      color: #000;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      width: auto;
      flex: 1;
    }

    .edit-mode {
      background: #fff8dc;
    }
  </style>
</head>
<body>

  <div id="left">
    <div class="topbar">
      <a href="/inbox">Inbox</a>
      <a href="/logout">Logout</a>
    </div>

    <h2>KB Manager</h2>
<div class="card">
  <h3>Quick Capture / Random Knowledge</h3>

  <input id="quickTitle" placeholder="Optional title" />

  <textarea id="quickRawText" placeholder="Paste any raw knowledge here: policies, service explanations, random notes, old archive text, staff guidance, FAQs, copied website text, anything useful..."></textarea>

  <input id="quickNotes" placeholder="Optional notes" />

  <select id="quickSourceType">
    <option value="manual">manual</option>
    <option value="email">email</option>
    <option value="website">website</option>
    <option value="archive">archive</option>
    <option value="staff">staff</option>
  </select>

  <select id="quickStatus">
    <option value="pending">pending</option>
    <option value="reviewed">reviewed</option>
    <option value="processed">processed</option>
  </select>

  <button onclick="createQuickCapture()">Save Quick Capture</button>
</div>
    <div class="card">
      <h3>Create Category</h3>
      <input id="catName" placeholder="Category name" />
      <textarea id="catDesc" placeholder="Category description"></textarea>
      <button onclick="createCategory()">Save Category</button>
    </div>

    <div class="card" id="articleFormCard">
      <h3 id="formTitle">Create Knowledge Article</h3>

      <select id="articleCategory"></select>

      <input id="articleTitle" placeholder="Title" />
      <input id="articleQuestion" placeholder="Question (optional)" />
      <textarea id="articleAnswer" placeholder="Answer / content"></textarea>
      <input id="articleKeywords" placeholder="Keywords (comma separated)" />
      <input id="articleAudience" placeholder="Audience (e.g. client, student, partner, staff)" />

      <select id="articleLanguage">
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>

      <select id="articleStatus">
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>

      <button id="saveArticleBtn" onclick="createOrUpdateArticle()">Save Article</button>
      <button id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
    </div>
  </div>

  <div id="right">
    <h2>Quick Capture Entries</h2>
<div id="quickCaptureList"></div>

<hr style="margin: 20px 0;">
   
    <h2>Knowledge Articles</h2>

    <input id="searchBox" placeholder="Search title, question, answer, keywords..." oninput="renderArticles()" />

    <div class="filters">
      <select id="filterCategory" onchange="renderArticles()">
        <option value="">All categories</option>
      </select>

      <select id="filterAudience" onchange="renderArticles()">
        <option value="">All audiences</option>
        <option value="client">client</option>
        <option value="student">student</option>
        <option value="partner">partner</option>
        <option value="staff">staff</option>
      </select>

      <select id="filterLanguage" onchange="renderArticles()">
        <option value="">All languages</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>
    </div>

    <div id="articles"></div>
  </div>

  <script>
    let categories = [];
    let articles = [];
    let editingArticleId = null;

    async function loadCategories() {
      const res = await fetch("/api/kb/categories");
      categories = await res.json();

      const articleCategory = document.getElementById("articleCategory");
      const filterCategory = document.getElementById("filterCategory");

      articleCategory.innerHTML = '<option value="">No category</option>';
      filterCategory.innerHTML = '<option value="">All categories</option>';

      categories.forEach(cat => {
        const option1 = document.createElement("option");
        option1.value = cat.id;
        option1.textContent = cat.name;
        articleCategory.appendChild(option1);

        const option2 = document.createElement("option");
        option2.value = cat.name;
        option2.textContent = cat.name;
        filterCategory.appendChild(option2);
      });
    }

    async function loadArticles() {
      const res = await fetch("/api/kb/articles");
      articles = await res.json();
      renderArticles();
    }

    function renderArticles() {
      const search = document.getElementById("searchBox").value.toLowerCase().trim();
      const categoryFilter = document.getElementById("filterCategory").value;
      const audienceFilter = document.getElementById("filterAudience").value;
      const languageFilter = document.getElementById("filterLanguage").value;

      const container = document.getElementById("articles");
      container.innerHTML = "";

      const filtered = articles.filter(article => {
        const categoryName = article.kb_categories?.name || "";
        const haystack = [
          article.title || "",
          article.question || "",
          article.answer || "",
          article.keywords || "",
          article.audience || "",
          categoryName
        ].join(" ").toLowerCase();

        const matchesSearch = !search || haystack.includes(search);
        const matchesCategory = !categoryFilter || categoryName === categoryFilter;
        const matchesAudience = !audienceFilter || (article.audience || "").toLowerCase() === audienceFilter.toLowerCase();
        const matchesLanguage = !languageFilter || (article.language || "") === languageFilter;

        return matchesSearch && matchesCategory && matchesAudience && matchesLanguage;
      });

      filtered.forEach(article => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="title">${article.title}</div>
          <div class="small">
            Category: ${article.kb_categories?.name || "None"} |
            Language: ${article.language || "en"} |
            Status: ${article.status || "published"} |
            Audience: ${article.audience || ""}
          </div>
          <div class="small">Question: ${article.question || ""}</div>
          <div class="small">Keywords: ${article.keywords || ""}</div>
          <div class="answer">${article.answer || ""}</div>
          <div class="actions">
            <button onclick="editArticle(${article.id})">Edit</button>
            <button onclick="deleteArticle(${article.id})">Delete</button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    async function createCategory() {
      const name = document.getElementById("catName").value.trim();
      const description = document.getElementById("catDesc").value.trim();

      const res = await fetch("/api/kb/categories", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, description })
      });

      const result = await res.json();

      if (!res.ok) {
        alert("Category creation failed: " + JSON.stringify(result));
        return;
      }

      document.getElementById("catName").value = "";
      document.getElementById("catDesc").value = "";

      await loadCategories();
    }

    async function createOrUpdateArticle() {
      const category_id = document.getElementById("articleCategory").value;
      const title = document.getElementById("articleTitle").value.trim();
      const question = document.getElementById("articleQuestion").value.trim();
      const answer = document.getElementById("articleAnswer").value.trim();
      const keywords = document.getElementById("articleKeywords").value.trim();
      const audience = document.getElementById("articleAudience").value.trim();
      const language = document.getElementById("articleLanguage").value;
      const status = document.getElementById("articleStatus").value;

      const payload = {
        category_id,
        title,
        question,
        answer,
        keywords,
        audience,
        language,
        status
      };

      let res;

      if (editingArticleId) {
        res = await fetch(`/api/kb/articles/${editingArticleId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch("/api/kb/articles", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
      }

      const result = await res.json();

      if (!res.ok) {
        alert("Article save failed: " + JSON.stringify(result));
        return;
      }

      clearForm();
      await loadArticles();
    }

    function editArticle(id) {
      const article = articles.find(a => a.id === id);
      if (!article) return;

      editingArticleId = id;

      document.getElementById("formTitle").textContent = "Edit Knowledge Article";
      document.getElementById("articleFormCard").classList.add("edit-mode");
      document.getElementById("saveArticleBtn").textContent = "Update Article";
      document.getElementById("cancelEditBtn").style.display = "block";

      document.getElementById("articleCategory").value = article.category_id || "";
      document.getElementById("articleTitle").value = article.title || "";
      document.getElementById("articleQuestion").value = article.question || "";
      document.getElementById("articleAnswer").value = article.answer || "";
      document.getElementById("articleKeywords").value = article.keywords || "";
      document.getElementById("articleAudience").value = article.audience || "";
      document.getElementById("articleLanguage").value = article.language || "en";
      document.getElementById("articleStatus").value = article.status || "published";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelEdit() {
      clearForm();
    }

    function clearForm() {
      editingArticleId = null;

      document.getElementById("formTitle").textContent = "Create Knowledge Article";
      document.getElementById("articleFormCard").classList.remove("edit-mode");
      document.getElementById("saveArticleBtn").textContent = "Save Article";
      document.getElementById("cancelEditBtn").style.display = "none";

      document.getElementById("articleCategory").value = "";
      document.getElementById("articleTitle").value = "";
      document.getElementById("articleQuestion").value = "";
      document.getElementById("articleAnswer").value = "";
      document.getElementById("articleKeywords").value = "";
      document.getElementById("articleAudience").value = "";
      document.getElementById("articleLanguage").value = "en";
      document.getElementById("articleStatus").value = "published";
    }

    async function deleteArticle(id) {
      const confirmed = confirm("Are you sure you want to delete this article?");
      if (!confirmed) return;

      const res = await fetch(`/api/kb/articles/${id}`, {
        method: "DELETE"
      });

      const result = await res.json();

      if (!res.ok) {
        alert("Delete failed: " + JSON.stringify(result));
        return;
      }

      if (editingArticleId === id) {
        clearForm();
      }

      await loadArticles();
    }
async function loadQuickCapture() {
  const res = await fetch("/api/kb/quick-capture");
  const data = await res.json();

  const container = document.getElementById("quickCaptureList");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${item.title || "Untitled Quick Capture"}</div>
      <div class="small">
        Source: ${item.source_type || "manual"} |
        Status: ${item.status || "pending"}
      </div>
      <div class="small">${item.notes || ""}</div>
      <div class="answer">${item.raw_text || ""}</div>
      <div class="actions">
        <button onclick="deleteQuickCapture(${item.id})">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });
}

async function createQuickCapture() {
  const title = document.getElementById("quickTitle").value.trim();
  const raw_text = document.getElementById("quickRawText").value.trim();
  const notes = document.getElementById("quickNotes").value.trim();
  const source_type = document.getElementById("quickSourceType").value;
  const status = document.getElementById("quickStatus").value;

  const res = await fetch("/api/kb/quick-capture", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      raw_text,
      notes,
      source_type,
      status
    })
  });

  const result = await res.json();

  if (!res.ok) {
    alert("Quick capture failed: " + JSON.stringify(result));
    return;
  }

  document.getElementById("quickTitle").value = "";
  document.getElementById("quickRawText").value = "";
  document.getElementById("quickNotes").value = "";
  document.getElementById("quickSourceType").value = "manual";
  document.getElementById("quickStatus").value = "pending";

  await loadQuickCapture();
}

async function deleteQuickCapture(id) {
  const confirmed = confirm("Delete this quick capture entry?");
  if (!confirmed) return;

  const res = await fetch(`/api/kb/quick-capture/${id}`, {
    method: "DELETE"
  });

  const result = await res.json();

  if (!res.ok) {
    alert("Delete failed: " + JSON.stringify(result));
    return;
  }

  await loadQuickCapture();
  async function loadQuickCapture() {
  const res = await fetch("/api/kb/quick-capture");
  const data = await res.json();

  const container = document.getElementById("quickCaptureList");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${item.title || "Untitled Quick Capture"}</div>
      <div class="small">
        Source: ${item.source_type || "manual"} |
        Status: ${item.status || "pending"}
      </div>
      <div class="small">${item.notes || ""}</div>
      <div class="answer">${item.raw_text || ""}</div>
      <div class="actions">
        <button onclick="deleteQuickCapture(${item.id})">Delete</button>
      </div>
    `;

    container.appendChild(div);

}

async function createQuickCapture() {
  const title = document.getElementById("quickTitle").value.trim();
  const raw_text = document.getElementById("quickRawText").value.trim();
  const notes = document.getElementById("quickNotes").value.trim();
  const source_type = document.getElementById("quickSourceType").value;
  const status = document.getElementById("quickStatus").value;

  const res = await fetch("/api/kb/quick-capture", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({

  });

  if (!res.ok) {

  }

  document.getElementById("quickTitle").value = "";
  document.getElementById("quickRawText").value = "";
  document.getElementById("quickNotes").value = "";
  document.getElementById("quickSourceType").value = "manual";

  await loadQuickCapture();
}

  const confirmed = confirm("Delete this quick capture entry?");
  if (!confirmed) return;

  const res = await fetch(`/api/kb/quick-capture/${id}`, {
    method: "DELETE"
  });

  }

}
loadCategories();
loadArticles();
loadQuickCapture();
  </script>
</body>
</html>
