<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LSA GLOBAL Inbox</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 32%;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 12px;
      box-sizing: border-box;
      background: #fff;
    }
    #chatPane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f7f7f7;
    }
    #chatHeader {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: #fff;
    }
    .chat-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #chatTitle {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .thread-actions {
      display: flex;
      gap: 8px;
    }
    .thread-actions button {
      border: 1px solid #d0d0d0;
      background: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .thread-actions button:hover {
      background: #f6f6f6;
    }
    .thread-actions .danger {
      border-color: #d8b7b7;
      color: #a12626;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f7f7f7;
    }
    .msg {
      max-width: 75%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .in {
      background: #fff;
      border: 1px solid #ddd;
      margin-right: auto;
    }
    .out {
      background: #dcf8c6;
      margin-left: auto;
    }
    #composer {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 10px;
      gap: 10px;
      background: #fff;
    }
    #composer textarea {
      flex: 1;
      height: 70px;
      resize: none;
      padding: 10px;
    }
    .composer-tools {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 140px;
    }
    #composer button {
      width: 100%;
      height: 36px;
    }
    .attach-label {
      display: inline-block;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f8f8f8;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
    }
    #attachmentInput {
      display: none;
    }
    #attachmentName {
      font-size: 12px;
      color: #444;
      min-height: 16px;
    }
    #attachBtn {
      width: 48px !important;
      font-size: 20px;
      line-height: 1;
    }
    #selectedFile {
      min-width: 140px;
      max-width: 220px;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: center;
    }
    .thread {
      border-bottom: 1px solid #eee;
      padding: 10px;
      cursor: pointer;
    }
    .thread:hover {
      background: #f2f2f2;
    }
    .small {
      color: #666;
      font-size: 12px;
    }
    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #efefef;
      font-size: 12px;
    }
    .attachment {
      margin-top: 8px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #ddd;
      background: #fff;
    }
    .attachment img,
    .attachment video {
      max-width: 280px;
      display: block;
    }
    .attachment audio {
      width: 280px;
      display: block;
      background: #f8f8f8;
    }
    .attachment-link {
      display: inline-block;
      padding: 8px 10px;
      text-decoration: none;
      color: #0b57d0;
    }
    .caption {
      margin-top: 6px;
      font-size: 13px;
      color: #333;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>LSA GLOBAL Inbox</h3>
    <div id="threads"></div>
  </div>

  <div id="chatPane">
    <div id="chatHeader">
      <div class="chat-header-row">
        <div id="chatTitle">Select a conversation</div>
        <div class="thread-actions">
          <button type="button" onclick="archiveThread()">Archive</button>
          <button type="button" onclick="clearChat()">Clear Chat</button>
          <button type="button" class="danger" onclick="deleteThread()">Delete Thread</button>
        </div>
      </div>
      <div>
        <select id="labelSelect" onchange="updateLabel()">
          <option value="">No label</option>
          <option value="Hot">Hot</option>
          <option value="Quote">Quote</option>
          <option value="Course">Course</option>
          <option value="Interpreting">Interpreting</option>
          <option value="Advisor">Advisor</option>
          <option value="Follow-up">Follow-up</option>
        </select>
      </div>
    </div>

    <div id="messages"></div>

    <div id="composer">
      <textarea id="replyBox" placeholder="Type your reply..."></textarea>
      <div class="composer-tools">
        <label class="attach-label" for="attachmentInput">📎 Attach file</label>
        <input id="attachmentInput" type="file" accept="image/*,application/pdf" />
        <div id="attachmentName"></div>
        <button onclick="sendReply()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let currentWaId = null;
    let pendingAttachment = null;
    const MEDIA_TYPES = new Set(["image", "video", "audio", "document"]);

    function openAttachmentPicker() {
      document.getElementById("attachmentInput").click();
    }

    function clearPendingAttachment() {
      pendingAttachment = null;
      document.getElementById("attachmentInput").value = "";
      document.getElementById("selectedFile").textContent = "No file";
    }

    document.getElementById("attachmentInput").addEventListener("change", event => {
      const file = event.target.files?.[0] || null;
      pendingAttachment = file;
      document.getElementById("selectedFile").textContent = file ? file.name : "No file";
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const commaIndex = result.indexOf(",");
          resolve(commaIndex >= 0 ? result.slice(commaIndex + 1) : result);
        };
        reader.onerror = () => reject(new Error("Unable to read selected file."));
        reader.readAsDataURL(file);
      });
    }

    function escapeHtml(value) {
      return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderAttachment(msg) {
      if (!MEDIA_TYPES.has(msg.media_type) || !msg.media_url) return "";
      const safeUrl = encodeURI(msg.media_url);
      const safeName = escapeHtml(msg.file_name || `${msg.media_type} attachment`);
      const safeMimeType = escapeHtml(msg.mime_type || "");

      if (msg.media_type === "image") {
        return `
          <div class="attachment">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">
              <img src="${safeUrl}" alt="${safeName}" loading="lazy" />
            </a>
          </div>
        `;
      }

      if (msg.media_type === "video") {
        return `
          <div class="attachment">
            <video controls preload="metadata">
              <source src="${safeUrl}" type="${safeMimeType}" />
            </video>
          </div>
        `;
      }

      if (msg.media_type === "audio") {
        return `
          <div class="attachment">
            <audio controls preload="metadata">
              <source src="${safeUrl}" type="${safeMimeType}" />
            </audio>
          </div>
        `;
      }

      return `
        <div class="attachment">
          <a class="attachment-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer" download>
            📎 ${safeName}
          </a>
        </div>
      `;
    }

    function renderMessageBody(msg) {
      const textBody = msg.body || "";
      const safeCaption = escapeHtml(msg.caption || "");
      const attachmentHtml = renderAttachment(msg);
      const shouldRenderCaption = Boolean(msg.caption) && msg.caption !== textBody;

      if (attachmentHtml) {
        return `
          <div>${escapeHtml(textBody)}</div>
          ${attachmentHtml}
          ${shouldRenderCaption ? `<div class="caption">${safeCaption}</div>` : ""}
        `;
      }

      return `<div>${escapeHtml(textBody)}</div>`;
    }

    async function loadThreads() {
      const res = await fetch("/api/conversations");
      const threads = await res.json();

      const container = document.getElementById("threads");
      container.innerHTML = "";

      threads.forEach(thread => {
        const div = document.createElement("div");
        div.className = "thread";
        div.innerHTML = `
          <div><strong>${thread.contact_name || "Unknown"}</strong></div>
          <div>${thread.wa_id}</div>
          <div class="small">${thread.last_message || ""}</div>
          <div class="badge">${thread.label || "No label"}</div>
        `;
        div.onclick = () => loadConversation(thread.wa_id, thread.contact_name || "Contact");
        container.appendChild(div);
      });
    }

    async function loadConversation(wa_id, contactName = "Contact") {
      currentWaId = wa_id;

      document.getElementById("chatTitle").textContent =
        `${contactName} — ${wa_id}`;

      const res = await fetch(`/api/conversations/${encodeURIComponent(wa_id)}`);
      const messages = await res.json();

      const container = document.getElementById("messages");
      container.innerHTML = "";

      if (!Array.isArray(messages) || messages.length === 0) {
        container.innerHTML = "<div class='small'>No messages yet.</div>";
        document.getElementById("labelSelect").value = "";
        return;
      }

      messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = `msg ${msg.direction === "out" ? "out" : "in"}`;
        div.innerHTML = renderMessageBody(msg);
        container.appendChild(div);
      });

      const last = messages[messages.length - 1];
      document.getElementById("labelSelect").value = last.label || "";

      container.scrollTop = container.scrollHeight;
    }

    async function sendReply() {
      const box = document.getElementById("replyBox");
      const fileInput = document.getElementById("attachmentInput");
      const selectedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
      const body = box.value.trim();

      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      if (!body && !selectedFile) return;

      let res;
      if (selectedFile) {
        const formData = new FormData();
        formData.append("wa_id", currentWaId);
        formData.append("caption", body);
        formData.append("attachment", selectedFile);
        res = await fetch("/api/send-attachment", {
          method: "POST",
          body: formData
        });
      } else {
        res = await fetch("/api/send", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            wa_id: currentWaId,
            body
          })
        });
      }

      const result = await res.json();

      if (!res.ok) {
        alert("Send failed: " + JSON.stringify(result));
        return;
      }

      box.value = "";
      fileInput.value = "";
      document.getElementById("attachmentName").textContent = "";
      await loadConversation(currentWaId);
      await loadThreads();
    }

    document.getElementById("attachmentInput").addEventListener("change", event => {
      const file = event.target.files && event.target.files[0] ? event.target.files[0] : null;
      document.getElementById("attachmentName").textContent = file ? file.name : "";
    });

    async function updateLabel() {
      if (!currentWaId) return;

      const label = document.getElementById("labelSelect").value;

      const res = await fetch("/api/label", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          wa_id: currentWaId,
          label
        })
      });

      const result = await res.json();

      if (!res.ok) {
        alert("Label update failed: " + JSON.stringify(result));
        return;
      }

      await loadThreads();
      await loadConversation(currentWaId);
    }

    async function clearChat() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const confirmed = window.confirm("Clear all messages in this chat? This cannot be undone.");
      if (!confirmed) return;

      const res = await fetch(`/api/conversations/${encodeURIComponent(currentWaId)}/clear`, {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Clear chat failed: " + JSON.stringify(result));
        return;
      }

      await loadConversation(currentWaId);
      await loadThreads();

      if (result.contactRetained === false && result.reason) {
        alert(result.reason);
      }
    }

    async function deleteThread() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const deletingWaId = currentWaId;
      const confirmed = window.confirm("Delete this thread completely? This cannot be undone.");
      if (!confirmed) return;

      const res = await fetch(`/api/conversations/${encodeURIComponent(deletingWaId)}/delete`, {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Delete thread failed: " + JSON.stringify(result));
        return;
      }

      currentWaId = null;
      document.getElementById("chatTitle").textContent = "Select a conversation";
      document.getElementById("messages").innerHTML = "<div class='small'>Select a conversation.</div>";
      document.getElementById("labelSelect").value = "";
      await loadThreads();
    }

    async function archiveThread() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const archivingWaId = currentWaId;
      const confirmed = window.confirm("Archive this thread? It will be hidden from the active inbox.");
      if (!confirmed) return;

      const res = await fetch(`/api/conversations/${encodeURIComponent(archivingWaId)}/archive`, {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Archive thread failed: " + JSON.stringify(result));
        return;
      }

      currentWaId = null;
      document.getElementById("chatTitle").textContent = "Select a conversation";
      document.getElementById("messages").innerHTML = "<div class='small'>Select a conversation.</div>";
      document.getElementById("labelSelect").value = "";
      await loadThreads();
    }

    loadThreads();
    setInterval(loadThreads, 5000);
  </script>
</body>
</html>
