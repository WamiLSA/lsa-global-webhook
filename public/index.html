<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LSA GLOBAL Internal OS · Communications</title>
  <script src="/theme-init.js"></script>
  <link rel="stylesheet" href="/top-nav.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: var(--lsa-app-bg);
    }
    #appLayout {
      display: flex;
      height: calc(100vh - 64px);
    }
    #sidebar {
      width: 32%;
      border-right: 1px solid var(--lsa-border);
      overflow-y: auto;
      padding: 12px;
      box-sizing: border-box;
      background: var(--lsa-surface);
    }
    #chatPane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--lsa-app-bg);
    }
    #chatHeader {
      padding: 12px;
      border-bottom: 1px solid var(--lsa-border);
      background: var(--lsa-surface);
    }
    .chat-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #chatTitle {
      font-weight: bold;
      margin-bottom: 4px;
    }
    #chatActivity {
      color: var(--lsa-text-muted);
      font-size: 12px;
      min-height: 16px;
    }
    .thread-actions {
      display: flex;
      gap: 8px;
    }
    .thread-actions button {
      border: 1px solid var(--lsa-input-border);
      background: var(--lsa-surface);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .thread-actions button:hover {
      background: var(--lsa-hover);
    }
    .thread-actions .danger {
      border-color: #d8b7b7;
      color: #a12626;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: var(--lsa-app-bg);
    }
    .msg {
      max-width: 75%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-time {
      margin-top: 7px;
      font-size: 11px;
      color: var(--lsa-text-muted);
      text-align: right;
      white-space: nowrap;
    }
    .out .msg-time {
      color: color-mix(in srgb, var(--lsa-text-muted) 82%, var(--lsa-text));
    }
    .day-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 14px;
      color: var(--lsa-text-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
    }
    .day-separator::before,
    .day-separator::after {
      content: "";
      flex: 1;
      border-top: 1px solid var(--lsa-border);
    }
    .day-separator span {
      border: 1px solid var(--lsa-border);
      border-radius: 999px;
      background: var(--lsa-surface);
      padding: 5px 10px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .in {
      background: var(--lsa-surface);
      border: 1px solid var(--lsa-border);
      margin-right: auto;
    }
    .out {
      background: var(--lsa-chat-out);
      margin-left: auto;
    }
    #composer {
      display: flex;
      border-top: 1px solid var(--lsa-border);
      padding: 10px;
      gap: 10px;
      background: var(--lsa-surface);
    }
    #composer textarea {
      flex: 1;
      height: 70px;
      resize: none;
      padding: 10px;
    }
    .composer-tools {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 140px;
    }
    .composer-attachment-actions {
      display: flex;
      gap: 6px;
    }
    #composer button {
      width: 100%;
      height: 36px;
    }
    .attach-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border: 1px solid var(--lsa-input-border);
      border-radius: 6px;
      background: var(--lsa-surface-muted);
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      flex: 1;
    }
    .camera-label {
      width: 40px;
      min-width: 40px;
      font-size: 18px;
      padding: 8px 0;
      border-radius: 50%;
    }
    .attach-label:hover {
      filter: brightness(0.97);
    }
    #attachmentInput {
      display: none;
    }
    #cameraInput {
      display: none;
    }
    #attachmentName {
      font-size: 12px;
      color: var(--lsa-text-muted);
      min-height: 16px;
    }
    .thread {
      border-bottom: 1px solid var(--lsa-border);
      padding: 10px;
      cursor: pointer;
    }
    .thread-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .thread-time {
      color: var(--lsa-text-muted);
      font-size: 12px;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .thread-preview {
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .thread-activity {
      margin-top: 4px;
      color: var(--lsa-text-muted);
      font-size: 11px;
    }
    .thread:hover {
      background: var(--lsa-hover);
    }
    .small {
      color: var(--lsa-text-muted);
      font-size: 12px;
    }
    .thread-diagnostic {
      border: 1px solid #f2c97d;
      background: color-mix(in srgb, #f59e0b 12%, var(--lsa-surface));
      border-radius: 10px;
      color: var(--lsa-text);
      padding: 10px;
      margin: 8px 0 12px;
      font-size: 13px;
      line-height: 1.35;
    }
    .thread-diagnostic strong {
      display: block;
      margin-bottom: 4px;
    }
    .thread-diagnostic .small {
      margin-top: 6px;
    }
    
        .hub-identity { margin-bottom: 12px; }
    .hub-identity h3 { margin: 0; }
    .channel-toggle {display:flex; gap:8px; margin-bottom:10px;}
    .channel-toggle button{flex:1; border:1px solid var(--lsa-input-border); border-radius:10px; padding:10px 10px; cursor:pointer; font-weight:700;}
    .channel-toggle .whatsapp{background:#ffffff; color:#1f2937; border-color:#d0d7e2;}
    .channel-toggle .mail{background:#e9f1ff; border-color:#8fb5f8; color:#113f92;}
    .channel-toggle button.active{box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--lsa-blue) 38%, transparent);}
    :root[data-theme="dark"] .channel-toggle .whatsapp{background:#f5f7fb; color:#111827; border-color:#9aa8bc;}
    :root[data-theme="dark"] .channel-toggle .mail{background:#264a86; color:#f8fbff; border-color:#5f92e6;}
    .thread-mail{border-left:4px solid #2d6cdf; background:color-mix(in srgb, #2d6cdf 8%, var(--lsa-surface));}

    .view-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .view-toggle button {
      border: 1px solid var(--lsa-input-border);
      background: var(--lsa-surface);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .view-toggle button.active {
      background: var(--lsa-hover);
      border-color: var(--lsa-border);
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--lsa-surface-muted);
      font-size: 12px;
    }
    .attachment {
      margin-top: 8px;
      width: min(320px, 100%);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--lsa-border);
      background: var(--lsa-surface);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }
    .attachment-media {
      display: block;
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      background: var(--lsa-surface-muted);
    }
    .attachment audio {
      width: 100%;
      display: block;
      background: var(--lsa-surface-muted);
    }
    .attachment-details {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
    }
    .attachment-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      font-size: 16px;
      background: var(--lsa-surface-muted);
    }
    .attachment-meta {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .attachment-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--lsa-text);
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .attachment-subtitle {
      font-size: 12px;
      color: var(--lsa-text-muted);
      text-transform: uppercase;
    }
    .attachment-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--lsa-border);
      border-radius: 8px;
      padding: 6px 8px;
      text-decoration: none;
      color: var(--lsa-blue);
      background: var(--lsa-bg);
      font-size: 12px;
      white-space: nowrap;
    }
    .caption {
      margin-top: 6px;
      font-size: 13px;
      color: var(--lsa-text);
      white-space: pre-wrap;
    }
    .msg-meta {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--lsa-border);
      display: grid;
      gap: 6px;
    }
    .meta-block {
      font-size: 12px;
      line-height: 1.4;
      color: var(--lsa-text-muted);
      white-space: pre-wrap;
    }
    .meta-label {
      font-weight: 600;
      color: var(--lsa-text);
    }
    .mediation-panel {
      margin-top: 8px;
      border: 1px solid var(--lsa-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--lsa-surface-muted);
    }
    .mediation-row {
      padding: 8px 10px;
      border-top: 1px solid var(--lsa-border);
      font-size: 12px;
      line-height: 1.45;
      color: var(--lsa-text);
      white-space: pre-wrap;
    }
    .mediation-row:first-child {
      border-top: none;
    }
    .mediation-row--highlight {
      background: color-mix(in srgb, var(--lsa-hover) 60%, transparent);
    }
    .mediation-row-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: var(--lsa-text-muted);
    }
  </style>
</head>
<body data-page="inbox">
  <div id="topNavMount"></div>
  <div id="appLayout">
  <div id="sidebar">
    <div class="hub-identity"><h3>Communications Hub</h3></div>
    <div class="channel-toggle">
      <button id="channelWhatsAppBtn" type="button" class="active whatsapp" onclick="setChannel('whatsapp')">💬 WhatsApp Inbox</button>
      <button id="channelMailBtn" type="button" class="mail" onclick="setChannel('mail')">✉️ Mail Inbox</button>
    </div>
    <div class="view-toggle">
      <button id="activeViewBtn" type="button" class="active" onclick="setInboxView('active')">Active</button>
      <button id="archivedViewBtn" type="button" onclick="setInboxView('archived')">Archived</button>
    </div>
    <div id="threads"></div>
  </div>

  <div id="chatPane">
    <div id="chatHeader">
      <div class="chat-header-row">
        <div>
          <div id="chatTitle">Select a conversation</div>
          <div id="chatActivity"></div>
        </div>
        <div class="thread-actions">
          <button type="button" id="archiveBtn" onclick="archiveThread()">Archive</button>
          <button type="button" id="unarchiveBtn" onclick="unarchiveThread()" style="display:none;">Unarchive</button>
          <button type="button" onclick="clearChat()">Clear Chat</button>
          <button type="button" class="danger" onclick="deleteThread()">Delete Thread</button>
        </div>
      </div>
      <div>
        <select id="labelSelect" onchange="updateLabel()">
          <option value="">No label</option>
          <option value="Hot">Hot</option>
          <option value="Quote">Quote</option>
          <option value="Course">Course</option>
          <option value="Interpreting">Interpreting</option>
          <option value="Advisor">Advisor</option>
          <option value="Follow-up">Follow-up</option>
        </select>
      </div>
    </div>

    <div id="messages"></div>

    <div id="composer">
      <textarea id="replyBox" placeholder="Type your reply..."></textarea>
      <div class="composer-tools">
        <div class="composer-attachment-actions">
          <label class="attach-label" for="attachmentInput">📎 Attach file</label>
          <label class="attach-label camera-label" for="cameraInput" title="Take photo" aria-label="Take photo with camera">📷</label>
        </div>
        <input id="attachmentInput" type="file" accept="image/*,video/*,audio/*,application/pdf,.doc,.docx,.txt,.rtf,.odt,.xls,.xlsx,.ppt,.pptx,.zip" />
        <input id="cameraInput" type="file" accept="image/*" capture="environment" />
        <div id="attachmentName"></div>
        <button onclick="sendReply()">Send</button>
      </div>
    </div>
  </div>

  </div>

  <script src="/global-progress.js"></script>
  <script src="/top-nav.js"></script>
  <script>
    let currentWaId = null;
    let currentContactName = "Contact";
    let pendingAttachment = null;
    let currentView = "active";
    let currentChannel = "whatsapp";
    let threadListRequestSeq = 0;
    let conversationRequestSeq = 0;

    function setChannel(channel) {
      currentChannel = channel === "mail" ? "mail" : "whatsapp";
      document.getElementById("channelWhatsAppBtn").classList.toggle("active", currentChannel === "whatsapp");
      document.getElementById("channelMailBtn").classList.toggle("active", currentChannel === "mail");
      const composer = document.getElementById("composer");
      composer.style.display = "flex";
      document.getElementById("replyBox").placeholder = currentChannel === "mail" ? "Type an email reply..." : "Type your reply...";
      resetConversationPane();
      clearAttachmentSelection();
      loadThreads();
    }

    function setInboxView(view) {
      currentView = view === "archived" ? "archived" : "active";
      document.getElementById("activeViewBtn").classList.toggle("active", currentView === "active");
      document.getElementById("archivedViewBtn").classList.toggle("active", currentView === "archived");
      setThreadActionButtons();
      const isMail = currentChannel === "mail";
      document.getElementById("labelSelect").style.display = isMail ? "none" : "inline-block";
      loadThreads();
    }

    function setThreadActionButtons() {
      const isArchivedView = currentView === "archived";
      document.getElementById("archiveBtn").style.display = isArchivedView ? "none" : "inline-block";
      document.getElementById("unarchiveBtn").style.display = isArchivedView ? "inline-block" : "none";
    }

    function resetConversationPane() {
      currentWaId = null;
      currentContactName = "Contact";
      document.getElementById("chatTitle").textContent = "Select a conversation";
      document.getElementById("chatActivity").textContent = "";
      document.getElementById("messages").innerHTML = "<div class='small'>Select a conversation.</div>";
      document.getElementById("labelSelect").value = "";
    }

    function getThreadActionEndpoint(channel, threadId, action) {
      const safeThreadId = encodeURIComponent(threadId);
      if (channel === "mail") {
        return `/api/communications/mail/threads/${safeThreadId}/${action}`;
      }
      return `/api/conversations/${safeThreadId}/${action}`;
    }
    const MEDIA_TYPES = new Set(["image", "video", "audio", "document"]);

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const commaIndex = result.indexOf(",");
          resolve(commaIndex >= 0 ? result.slice(commaIndex + 1) : result);
        };
        reader.onerror = () => reject(new Error("Unable to read selected file."));
        reader.readAsDataURL(file);
      });
    }

    function escapeHtml(value) {
      return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    function parseMessageDate(value) {
      if (!value) return null;
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getMessageTimestamp(record = {}) {
      return record.created_at || record.timestamp || record.last_time || record.last_activity_at || record.date || null;
    }

    function formatMessageTime(value) {
      const date = parseMessageDate(value);
      if (!date) return "Time unavailable";
      return new Intl.DateTimeFormat(undefined, {
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).format(date);
    }

    function startOfLocalDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDayLabel(value) {
      const date = parseMessageDate(value);
      if (!date) return "Date unavailable";
      const today = startOfLocalDay(new Date());
      const target = startOfLocalDay(date);
      const diffDays = Math.round((today - target) / 86400000);
      if (diffDays === 0) return "Today";
      if (diffDays === 1) return "Yesterday";
      if (diffDays > 1 && diffDays < 7) {
        return new Intl.DateTimeFormat(undefined, { weekday: "long" }).format(date);
      }
      return new Intl.DateTimeFormat(undefined, {
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(date);
    }

    function getDayKey(value) {
      const date = parseMessageDate(value);
      if (!date) return "unknown";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function formatThreadRecency(value) {
      const date = parseMessageDate(value);
      if (!date) return "—";
      const today = startOfLocalDay(new Date());
      const target = startOfLocalDay(date);
      const diffDays = Math.round((today - target) / 86400000);
      if (diffDays === 0) return formatMessageTime(date);
      if (diffDays === 1) return "Yesterday";
      if (diffDays > 1 && diffDays < 7) {
        return new Intl.DateTimeFormat(undefined, { weekday: "short" }).format(date);
      }
      return new Intl.DateTimeFormat(undefined, { day: "numeric", month: "short" }).format(date);
    }

    function formatLastActivity(value, direction) {
      const date = parseMessageDate(value);
      if (!date) return "Last activity unavailable";
      const actor = direction === "out" || direction === "outgoing" ? "last staff reply" : "last contact message";
      return `Last activity: ${formatDayLabel(date)} at ${formatMessageTime(date)} · ${actor}`;
    }


    function extensionFromFileName(fileName = "") {
      const match = String(fileName).toLowerCase().match(/\.([a-z0-9]+)$/);
      return match ? match[1] : "";
    }

    function getAttachmentKind(msg) {
      const mimeType = String(msg.mime_type || "").toLowerCase();
      const ext = extensionFromFileName(msg.file_name || "");

      if (msg.media_type === "image" || mimeType.startsWith("image/")) return "image";
      if (msg.media_type === "video" || mimeType.startsWith("video/")) return "video";
      if (msg.media_type === "audio" || mimeType.startsWith("audio/")) return "audio";
      if (mimeType === "application/pdf" || ext === "pdf") return "pdf";

      const docExtensions = new Set(["doc", "docx", "txt", "rtf", "odt", "xls", "xlsx", "ppt", "pptx", "csv"]);
      if (msg.media_type === "document" || mimeType.startsWith("application/") || docExtensions.has(ext)) return "document";

      return "file";
    }

    function getAttachmentBadge(kind, mimeType, ext) {
      if (kind === "pdf") return "PDF";
      if (kind === "image") return "IMAGE";
      if (kind === "audio") return "AUDIO";
      if (kind === "video") return "VIDEO";
      return (mimeType || ext || "FILE").replace(/[^a-z0-9/+.-]/gi, "").slice(0, 16).toUpperCase();
    }

    function renderAttachmentCard({ url, fileName, kind, mimeType, ext }) {
      const iconByKind = {
        pdf: "📄",
        document: "🗂️",
        audio: "🎵",
        video: "🎬",
        image: "🖼️",
        file: "📎"
      };

      const badge = getAttachmentBadge(kind, mimeType, ext);

      return `
        <div class="attachment">
          <div class="attachment-details">
            <div class="attachment-icon">${iconByKind[kind] || iconByKind.file}</div>
            <div class="attachment-meta">
              <div class="attachment-title" title="${fileName}">${fileName}</div>
              <div class="attachment-subtitle">${badge}</div>
            </div>
            <a class="attachment-link" href="${url}" target="_blank" rel="noopener noreferrer" download>Open</a>
          </div>
        </div>
      `;
    }

    function renderAttachment(msg) {
      if (!MEDIA_TYPES.has(msg.media_type) || !msg.media_url) return "";
      const safeUrl = encodeURI(msg.media_url);
      const safeName = escapeHtml(msg.file_name || `${msg.media_type} attachment`);
      const safeMimeType = escapeHtml(msg.mime_type || "");
      const ext = extensionFromFileName(msg.file_name || "");
      const kind = getAttachmentKind(msg);

      if (kind === "image") {
        return `
          <div class="attachment">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">
              <img class="attachment-media" src="${safeUrl}" alt="${safeName}" loading="lazy" />
            </a>
            <div class="attachment-details">
              <div class="attachment-icon">🖼️</div>
              <div class="attachment-meta">
                <div class="attachment-title" title="${safeName}">${safeName}</div>
                <div class="attachment-subtitle">${getAttachmentBadge(kind, safeMimeType, ext)}</div>
              </div>
              <a class="attachment-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">View</a>
            </div>
          </div>
        `;
      }

      if (kind === "video") {
        return `
          <div class="attachment">
            <video class="attachment-media" controls preload="metadata">
              <source src="${safeUrl}" type="${safeMimeType}" />
            </video>
            <div class="attachment-details">
              <div class="attachment-icon">🎬</div>
              <div class="attachment-meta">
                <div class="attachment-title" title="${safeName}">${safeName}</div>
                <div class="attachment-subtitle">${getAttachmentBadge(kind, safeMimeType, ext)}</div>
              </div>
              <a class="attachment-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">Open</a>
            </div>
          </div>
        `;
      }

      if (kind === "audio") {
        return `
          <div class="attachment">
            <audio controls preload="metadata">
              <source src="${safeUrl}" type="${safeMimeType}" />
            </audio>
            <div class="attachment-details">
              <div class="attachment-icon">🎵</div>
              <div class="attachment-meta">
                <div class="attachment-title" title="${safeName}">${safeName}</div>
                <div class="attachment-subtitle">${getAttachmentBadge(kind, safeMimeType, ext)}</div>
              </div>
              <a class="attachment-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">Open</a>
            </div>
          </div>
        `;
      }

      return renderAttachmentCard({
        url: safeUrl,
        fileName: safeName,
        kind,
        mimeType: safeMimeType,
        ext
      });
    }

    function renderMessageBody(msg) {
      const textBody = msg.body || "";
      const safeCaption = escapeHtml(msg.caption || "");
      const attachmentHtml = renderAttachment(msg);
      const shouldRenderCaption = Boolean(msg.caption) && msg.caption !== textBody;
      const isOutbound = msg.direction === "out";
      const staffReplyText = String(msg.staff_reply_text || "").trim();
      const sentReplyText = String(msg.sent_reply_text || "").trim();
      const translatedText = String(msg.translated_text || "").trim();
      const originalLanguage = String(msg.original_language || "").trim() || "unknown";
      const translatedLanguage = String(msg.translated_language || "").trim() || "en";
      const staffReplyLanguage = String(msg.staff_reply_language || "").trim() || "en";
      const sentReplyLanguage = String(msg.sent_reply_language || "").trim() || "unknown";

      let metadataHtml = "";
      if (!isOutbound) {
        const inboundOriginal = textBody;
        const hasDistinctStaffTranslation = translatedText && translatedText !== textBody;
        const inboundRows = [`
            <div class="mediation-row">
              <span class="mediation-row-label">Original (${escapeHtml(originalLanguage)})</span>
              ${escapeHtml(inboundOriginal)}
            </div>
        `];
        if (hasDistinctStaffTranslation) {
          inboundRows.push(`
            <div class="mediation-row mediation-row--highlight">
              <span class="mediation-row-label">Staff Translation (${escapeHtml(translatedLanguage)})</span>
              ${escapeHtml(translatedText)}
            </div>
          `);
        }
        metadataHtml = `<div class="mediation-panel">${inboundRows.join("")}</div>`;
      } else if (isOutbound) {
        const blocks = [];
        const staffTextToShow = staffReplyText || textBody || "";
        const sentTextToShow = sentReplyText || textBody || "";
        if (staffTextToShow) {
          blocks.push(`
            <div class="mediation-row">
              <span class="mediation-row-label">Staff Reply (${escapeHtml(staffReplyLanguage)})</span>
              ${escapeHtml(staffTextToShow)}
            </div>
          `);
        }
        if (sentTextToShow) {
          blocks.push(`
            <div class="mediation-row mediation-row--highlight">
              <span class="mediation-row-label">Sent to Customer (${escapeHtml(sentReplyLanguage)})</span>
              ${escapeHtml(sentTextToShow)}
            </div>
          `);
        }
        metadataHtml = blocks.length ? `<div class="mediation-panel">${blocks.join("")}</div>` : "";
      }

      if (attachmentHtml) {
        return `
          <div>${escapeHtml(textBody)}</div>
          ${attachmentHtml}
          ${shouldRenderCaption ? `<div class="caption">${safeCaption}</div>` : ""}
          ${metadataHtml}
        `;
      }

      return `<div>${escapeHtml(textBody)}</div>${metadataHtml}`;
    }

    async function loadThreads() {
      const channelAtRequest = currentChannel;
      const viewAtRequest = currentView;
      const requestSeq = ++threadListRequestSeq;
      const endpoint = channelAtRequest === "mail"
        ? (viewAtRequest === "archived" ? "/api/communications/mail/threads?view=archived" : "/api/communications/mail/threads")
        : (viewAtRequest === "archived" ? "/api/conversations/archived" : "/api/conversations");
      const container = document.getElementById("threads");
      let res;
      let payload;
      try {
        res = await fetch(endpoint);
        payload = await res.json();
      } catch (error) {
        if (requestSeq !== threadListRequestSeq || currentChannel !== channelAtRequest || currentView !== viewAtRequest) return;
        console.error("[inbox-frontend] thread fetch request failed", { endpoint, error: error?.message || String(error) });
        container.innerHTML = `
          <div class="thread-diagnostic">
            <strong>Thread loading problem</strong>
            The Communications Hub could not reach the thread-loading endpoint. This is a connection/configuration issue, not confirmation that inbox data is gone.
            <div class="small">Endpoint: ${escapeHtml(endpoint)}</div>
          </div>`;
        return;
      }

      if (requestSeq !== threadListRequestSeq || currentChannel !== channelAtRequest || currentView !== viewAtRequest) return;

      if (!res.ok || !Array.isArray(payload)) {
        console.error("[inbox-frontend] thread fetch failed", { endpoint, status: res.status, payload });
        const message = payload?.error?.message || payload?.error || "Unable to load threads.";
        const operatorMessage = payload?.error?.operator_message || "Please review the backend logs and database schema before treating this as an empty inbox.";
        const code = payload?.error?.code ? `<div class="small">Diagnostic code: ${escapeHtml(String(payload.error.code))}</div>` : "";
        container.innerHTML = `
          <div class="thread-diagnostic">
            <strong>Thread loading problem</strong>
            ${escapeHtml(String(message))}
            <div class="small">${escapeHtml(String(operatorMessage))}</div>
            ${code}
          </div>`;
        return;
      }
      const threads = payload;
      const degraded = res.headers.get("X-LSA-Inbox-Degraded") === "true";
      const missingColumns = res.headers.get("X-LSA-Inbox-Missing-Columns") || "";
      const schemaWarning = res.headers.get("X-LSA-Inbox-Warning") || "";
      console.log("[inbox-frontend] threads fetched", {
        endpoint,
        count: threads.length,
        degraded,
        missing_columns: missingColumns,
        warning: schemaWarning,
        active_rows: res.headers.get("X-LSA-Inbox-Active-Rows"),
        total_rows: res.headers.get("X-LSA-Inbox-Total-Rows")
      });

      container.innerHTML = "";

      if (degraded) {
        container.insertAdjacentHTML("beforeend", `
          <div class="thread-diagnostic">
            <strong>Inbox loaded in degraded mode</strong>
            Messages are still being shown, but optional schema-dependent fields are unavailable for this load.
            ${missingColumns ? `<div class="small">Missing/disabled fields: ${escapeHtml(missingColumns)}</div>` : ""}
            ${schemaWarning ? `<div class="small">${escapeHtml(schemaWarning)}</div>` : ""}
          </div>`);
      }

      if (threads.length === 0) {
        const emptyMessage = degraded
          ? `No ${viewAtRequest} threads could be shown in degraded mode. This may be a schema/configuration limitation, not proof that data is lost.`
          : `No ${viewAtRequest} threads.`;
        container.insertAdjacentHTML("beforeend", `<div class="small">${escapeHtml(emptyMessage)}</div>`);
        return;
      }

      threads.forEach(thread => {
        const div = document.createElement("div");
        const activityTime = getMessageTimestamp(thread) || thread.timestamp;
        const preview = thread.last_message || thread.preview || "";
        const displayName = thread.contact_name || thread.subject || "Unknown";
        const threadIdText = channelAtRequest === "mail" ? (thread.sender || "") : thread.wa_id;
        div.className = "thread";
        div.innerHTML = `
          <div class="thread-top">
            <strong>${escapeHtml(displayName)}</strong>
            <span class="thread-time" title="${escapeHtml(parseMessageDate(activityTime)?.toLocaleString() || "Time unavailable")}">${escapeHtml(formatThreadRecency(activityTime))}</span>
          </div>
          <div>${escapeHtml(threadIdText || "")}</div>
          <div class="small thread-preview">${escapeHtml(preview)}</div>
          <div class="thread-activity">${escapeHtml(formatLastActivity(activityTime, thread.last_direction || thread.direction))}</div>
          <div class="badge">${escapeHtml(thread.label || "No label")}</div>
        `;
        if (channelAtRequest === "mail") div.classList.add("thread-mail");
        div.onclick = () => {
          if (currentChannel !== channelAtRequest) return;
          loadConversation(channelAtRequest === "mail" ? thread.thread_id : thread.wa_id, displayName, activityTime, thread.last_direction || thread.direction, channelAtRequest);
        };
        container.appendChild(div);
      });
    }

    function updateAttachmentName(file) {
      const attachmentNameEl = document.getElementById("attachmentName");
      attachmentNameEl.textContent = file ? `Attached: ${file.name}` : "";
    }

    function clearAttachmentSelection() {
      document.getElementById("attachmentInput").value = "";
      document.getElementById("cameraInput").value = "";
      pendingAttachment = null;
      document.getElementById("attachmentName").textContent = "";
    }

    async function loadConversation(wa_id, contactName = "Contact", knownActivityTime = null, knownActivityDirection = null, channel = currentChannel) {
      const channelAtRequest = channel === "mail" ? "mail" : "whatsapp";
      const requestSeq = ++conversationRequestSeq;
      if (currentChannel !== channelAtRequest) return;
      const conversationChanged = currentWaId !== wa_id;
      currentWaId = wa_id;
      currentContactName = contactName || "Contact";
      setThreadActionButtons();
      const isMail = channelAtRequest === "mail";
      document.getElementById("labelSelect").style.display = isMail ? "none" : "inline-block";

      if (conversationChanged) {
        clearAttachmentSelection();
      }

      document.getElementById("chatTitle").textContent =
        channelAtRequest === "mail" ? `Mail Thread — ${contactName}` : `${contactName} — ${wa_id}`;
      document.getElementById("chatActivity").textContent = knownActivityTime
        ? formatLastActivity(knownActivityTime, knownActivityDirection)
        : "Loading latest activity...";

      let res;
      let messages;
      try {
        res = await fetch(channelAtRequest === "mail" ? `/api/communications/mail/threads/${encodeURIComponent(wa_id)}` : `/api/conversations/${encodeURIComponent(wa_id)}`);
        messages = await res.json();
      } catch (error) {
        if (requestSeq !== conversationRequestSeq || currentWaId !== wa_id || currentChannel !== channelAtRequest) return;
        console.error("[inbox-frontend] thread message fetch failed", { wa_id, channel: channelAtRequest, error: error?.message || String(error) });
        document.getElementById("messages").innerHTML = "<div class='small'>Unable to load this thread right now.</div>";
        document.getElementById("chatActivity").textContent = "Thread loading failed";
        return;
      }
      if (requestSeq !== conversationRequestSeq || currentWaId !== wa_id || currentChannel !== channelAtRequest) return;
      if (!res.ok) {
        document.getElementById("messages").innerHTML = "<div class='small'>Unable to load this thread right now.</div>";
        document.getElementById("chatActivity").textContent = "Thread loading failed";
        return;
      }
      console.log("[inbox-frontend] thread messages fetched", {
        wa_id,
        count: Array.isArray(messages) ? messages.length : 0
      });

      const container = document.getElementById("messages");
      container.innerHTML = "";

      if (!Array.isArray(messages) || messages.length === 0) {
        container.innerHTML = "<div class='small'>No messages yet.</div>";
        document.getElementById("labelSelect").value = "";
        document.getElementById("chatActivity").textContent = "No activity yet";
        return;
      }

      let previousDayKey = null;
      messages.forEach(msg => {
        const timestamp = getMessageTimestamp(msg);
        const dayKey = getDayKey(timestamp);
        if (dayKey !== previousDayKey) {
          const separator = document.createElement("div");
          separator.className = "day-separator";
          separator.innerHTML = `<span>${escapeHtml(formatDayLabel(timestamp))}</span>`;
          container.appendChild(separator);
          previousDayKey = dayKey;
        }

        const div = document.createElement("div");
        const direction = msg.direction || (msg.is_read ? "in" : "in");
        div.className = `msg ${direction === "out" || direction === "outgoing" ? "out" : "in"}`;
        if (channelAtRequest === "mail") {
          const recipients = Array.isArray(msg.recipients) ? msg.recipients.join(", ") : (msg.recipient || "-");
          const attachmentHtml = msg.attachment?.path
            ? `<div class="small">Attachment: <a href="${encodeURI(msg.attachment.path)}" target="_blank" rel="noopener noreferrer">${escapeHtml(msg.attachment.file_name || "document")}</a></div>`
            : "";
          div.innerHTML = `<div><strong>${escapeHtml(msg.subject || "(no subject)")}</strong></div>
            <div class="small">From: ${escapeHtml(msg.sender || "-")}</div>
            <div class="small">To: ${escapeHtml(recipients)}</div>
            <div class="small">${escapeHtml(msg.is_read ? "Read" : "Unread")}</div>
            <div>${escapeHtml(msg.body || msg.preview || "")}</div>${attachmentHtml}
            <div class="msg-time" title="${escapeHtml(parseMessageDate(timestamp)?.toLocaleString() || "Time unavailable")}">${escapeHtml(formatMessageTime(timestamp))}</div>`;
        } else {
          div.innerHTML = `${renderMessageBody(msg)}<div class="msg-time" title="${escapeHtml(parseMessageDate(timestamp)?.toLocaleString() || "Time unavailable")}">${escapeHtml(formatMessageTime(timestamp))}</div>`;
        }
        container.appendChild(div);
      });

      const last = messages[messages.length - 1];
      const lastTimestamp = getMessageTimestamp(last);
      document.getElementById("labelSelect").value = last.label || "";
      document.getElementById("chatActivity").textContent = formatLastActivity(lastTimestamp, last.direction);

      container.scrollTop = container.scrollHeight;
    }

    async function sendReply() {
      const box = document.getElementById("replyBox");
      const selectedFile = pendingAttachment;
      const body = box.value.trim();

      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      if (!body && !selectedFile) return;

      const channelAtSend = currentChannel;
      const threadIdAtSend = currentWaId;
      const contactNameAtSend = currentContactName;
      let res;
      if (channelAtSend === "mail") {
        const formData = new FormData();
        formData.append("thread_id", threadIdAtSend);
        formData.append("body", body);
        if (selectedFile) formData.append("attachment", selectedFile);
        res = await fetch("/api/communications/mail/reply", { method: "POST", body: formData });
      } else if (selectedFile) {
        const formData = new FormData();
        formData.append("wa_id", threadIdAtSend);
        formData.append("caption", body);
        formData.append("attachment", selectedFile);
        res = await fetch("/api/send-attachment", {
          method: "POST",
          body: formData
        });
      } else {
        res = await fetch("/api/send", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            wa_id: threadIdAtSend,
            body
          })
        });
      }

      const result = await res.json();

      if (!res.ok) {
        alert("Send failed: " + JSON.stringify(result));
        return;
      }

      box.value = "";
      clearAttachmentSelection();
      if (currentWaId === threadIdAtSend && currentChannel === channelAtSend) {
        await loadConversation(threadIdAtSend, contactNameAtSend, null, null, channelAtSend);
      }
      await loadThreads();
    }

    function setPendingAttachmentFromInput(inputElement, counterpartInputId) {
      const file = inputElement.files && inputElement.files[0] ? inputElement.files[0] : null;
      pendingAttachment = file;
      if (file) {
        document.getElementById(counterpartInputId).value = "";
      }
      updateAttachmentName(file);
    }

    document.getElementById("attachmentInput").addEventListener("change", event => {
      setPendingAttachmentFromInput(event.target, "cameraInput");
    });

    document.getElementById("cameraInput").addEventListener("change", event => {
      setPendingAttachmentFromInput(event.target, "attachmentInput");
    });

    async function updateLabel() {
      if (!currentWaId || currentChannel === "mail") return;

      const label = document.getElementById("labelSelect").value;

      const res = await fetch("/api/label", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          wa_id: currentWaId,
          label
        })
      });

      const result = await res.json();

      if (!res.ok) {
        alert("Label update failed: " + JSON.stringify(result));
        return;
      }

      await loadThreads();
      await loadConversation(currentWaId, currentContactName, null, null, "whatsapp");
    }

    async function clearChat() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const clearingThreadId = currentWaId;
      const channelAtAction = currentChannel;
      const confirmed = window.confirm("Clear all messages in this chat? This cannot be undone.");
      if (!confirmed) return;

      const res = await fetch(getThreadActionEndpoint(channelAtAction, clearingThreadId, "clear"), {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Clear chat failed: " + JSON.stringify(result));
        return;
      }

      if (currentWaId === clearingThreadId && currentChannel === channelAtAction) {
        await loadConversation(clearingThreadId, currentContactName, null, null, channelAtAction);
      }
      await loadThreads();

      if (result.contactRetained === false && result.reason) {
        alert(result.reason);
      }
    }

    async function deleteThread() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const deletingWaId = currentWaId;
      const channelAtAction = currentChannel;
      const confirmed = window.confirm("Delete this thread completely? This cannot be undone.");
      if (!confirmed) return;

      const res = await fetch(getThreadActionEndpoint(channelAtAction, deletingWaId, "delete"), {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Delete thread failed: " + JSON.stringify(result));
        return;
      }

      resetConversationPane();
      await loadThreads();
    }

    async function archiveThread() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const archivingWaId = currentWaId;
      const channelAtAction = currentChannel;
      const confirmed = window.confirm("Archive this thread? It will be hidden from the active inbox.");
      if (!confirmed) return;

      const res = await fetch(getThreadActionEndpoint(channelAtAction, archivingWaId, "archive"), {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Archive thread failed: " + JSON.stringify(result));
        return;
      }

      resetConversationPane();
      await loadThreads();
    }

    async function unarchiveThread() {
      if (!currentWaId) {
        alert("Select a conversation first.");
        return;
      }

      const unarchivingWaId = currentWaId;
      const channelAtAction = currentChannel;
      const confirmed = window.confirm("Unarchive this thread? It will return to the active inbox.");
      if (!confirmed) return;

      const res = await fetch(getThreadActionEndpoint(channelAtAction, unarchivingWaId, "unarchive"), {
        method: "POST"
      });
      const result = await res.json();

      if (!res.ok) {
        alert("Unarchive thread failed: " + JSON.stringify(result));
        return;
      }

      resetConversationPane();
      if (currentView === "archived") {
        await loadThreads();
      } else {
        setInboxView("active");
      }
    }

    const initialView = new URLSearchParams(window.location.search).get("view");
    if (initialView === "archived") {
      document.body.setAttribute("data-page", "archived");
      const archivedLink = document.querySelector('.lsa-top-nav__link[href="/archived"]');
      const inboxLink = document.querySelector('.lsa-top-nav__link[href="/inbox"]');
      if (archivedLink) archivedLink.classList.add("is-active");
      if (inboxLink) inboxLink.classList.remove("is-active");
      setInboxView("archived");
    } else {
      setThreadActionButtons();
      const isMail = currentChannel === "mail";
      document.getElementById("labelSelect").style.display = isMail ? "none" : "inline-block";
      loadThreads();
    }
    setInterval(loadThreads, 5000);
  </script>
</body>
</html>
