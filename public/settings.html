<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings · LSA GLOBAL Internal</title>
  <link rel="stylesheet" href="/top-nav.css" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; }
    .wrap { max-width: 900px; margin: 24px auto; padding: 0 16px 24px; }
    .card { background:#111827; border:1px solid #334155; border-radius:14px; padding:20px; }
    h1 { margin:0 0 4px; }
    .sub { color:#94a3b8; margin:0 0 14px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    label { font-size:13px; color:#94a3b8; }
    input { border:1px solid #475569; background:#0b1220; color:#e2e8f0; border-radius:8px; padding:10px; }
    .password-row { display:flex; gap:8px; }
    .password-row input { flex:1; }
    .password-row button { background:#1e293b; color:#e2e8f0; border:1px solid #475569; }
    .avatar-preview { width:64px; height:64px; border-radius:999px; border:1px solid #334155; object-fit:cover; background:#0b1220; }
    .full { grid-column:1/-1; }
    .actions { margin-top:14px; display:flex; gap:10px; }
    button { border:0; border-radius:8px; padding:10px 14px; font-weight:700; cursor:pointer; }
    .save { background:#2563eb; color:#fff; }
    .status { margin-top:10px; min-height:20px; font-size:14px; }
    @media(max-width:700px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body data-page="settings">
  <div id="topNavMount"></div>
  <main class="wrap">
    <div class="card">
      <h1>Account Settings</h1>
      <p class="sub">Profile and security updates are saved to one backend account source shared by web and mobile.</p>
      <div class="grid">
        <div class="field full"><label>Avatar</label><img id="avatarPreview" class="avatar-preview" alt="avatar" /><input id="avatar_file" type="file" accept="image/*" /></div>
        <div class="field"><label>Email</label><input id="email" type="email" /></div>
        <div class="field"><label>Username</label><input id="username" /></div>
        <div class="field"><label>First name</label><input id="first_name" /></div>
        <div class="field"><label>Last name</label><input id="last_name" /></div>
        <div class="field full"><label>Display name</label><input id="display_name" /></div>
        <div class="field"><label>Current password</label><div class="password-row"><input id="current_password" type="password" /><button type="button" data-toggle="current_password">👁</button></div></div>
        <div class="field"><label>New password</label><div class="password-row"><input id="new_password" type="password" /><button type="button" data-toggle="new_password">👁</button></div></div>
        <div class="field"><label>Confirm new password</label><div class="password-row"><input id="confirm_password" type="password" /><button type="button" data-toggle="confirm_password">👁</button></div></div>
      </div>
      <div class="status" id="status"></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h1>Branding</h1>
      <p class="sub">Shared branding source for web and mobile in-app experience.</p>
      <div class="grid">
        <div class="field full"><label>Main Logo</label><img id="brandingLogoPreview" class="avatar-preview" style="width:120px;height:120px;border-radius:14px;" alt="branding-logo" /><input id="branding_logo_file" type="file" accept="image/*" /></div>
        <div class="field"><label>Brand name</label><input id="branding_brand_name" /></div>
        <div class="field"><label>Primary blue</label><input id="branding_primary_color" type="color" /></div>
        <div class="field"><label>Dark blue</label><input id="branding_dark_primary_color" type="color" /></div>
        <div class="field"><label>Accent red</label><input id="branding_accent_color" type="color" /></div>
        <div class="field"><label>Text on blue</label><input id="branding_text_on_primary" type="color" /></div>
      </div>
    </div>
    <div class="actions"><button class="save" id="saveBtn">Save Settings</button></div>
  </main>
  <script src="/top-nav.js"></script>
  <script src="/global-progress.js"></script>
  <script>
    const ids=["email","first_name","last_name","display_name","username","avatar_url"];
    const statusEl=document.getElementById('status');
    const avatarPreview=document.getElementById('avatarPreview');
    const brandingPreview=document.getElementById('brandingLogoPreview');
    let brandingState={};
    let initialFormState={};
    let initialBrandingState={};
    function msg(t,bad){statusEl.style.color=bad?'#fca5a5':'#86efac';statusEl.textContent=t;}
    function refreshPreview(url){avatarPreview.src=url||'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';}
    function refreshBrandingPreview(url){brandingPreview.src=url||'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';}
    async function load(){
      const r=await fetch('/api/account/settings');const d=await r.json();
      ids.forEach(k=>{ if(k!=='avatar_url') document.getElementById(k).value=d.user?.[k]||''; });
      initialFormState = {
        email: d.user?.email || '',
        username: d.user?.username || '',
        first_name: d.user?.first_name || '',
        last_name: d.user?.last_name || '',
        display_name: d.user?.display_name || ''
      };
      refreshPreview(d.user?.avatar_url||'');
      const br=await fetch('/api/branding/settings'); const bd=await br.json(); brandingState=bd.branding||{};
      document.getElementById('branding_brand_name').value=brandingState.brand_name||'LSA GLOBAL House';
      document.getElementById('branding_primary_color').value=brandingState.primary_color||'#0B3A8C';
      document.getElementById('branding_dark_primary_color').value=brandingState.dark_primary_color||'#072C70';
      document.getElementById('branding_accent_color').value=brandingState.accent_color||'#C81E1E';
      document.getElementById('branding_text_on_primary').value=brandingState.text_on_primary||'#FFFFFF';
      initialBrandingState = {
        brand_name: brandingState.brand_name || 'LSA GLOBAL House',
        primary_color: brandingState.primary_color || '#0B3A8C',
        dark_primary_color: brandingState.dark_primary_color || '#072C70',
        accent_color: brandingState.accent_color || '#C81E1E',
        text_on_primary: brandingState.text_on_primary || '#FFFFFF'
      };
      refreshBrandingPreview(brandingState.logo_url||'');
    }
    document.querySelectorAll('[data-toggle]').forEach((btn)=>btn.addEventListener('click',()=>{ const input=document.getElementById(btn.dataset.toggle); input.type=input.type==='password'?'text':'password'; }));
    document.getElementById('saveBtn').addEventListener('click', async()=>{
      try{
        await LSAGlobalProgress.withProgress('Save settings and branding', async (progress)=>{
          progress.update(10, 'Validating form...');
        const cp=document.getElementById('current_password').value.trim(); const np=document.getElementById('new_password').value; const cnp=document.getElementById('confirm_password').value;
        const wantsPasswordChange = Boolean(cp || np || cnp);
        if (wantsPasswordChange && (!cp || !np || !cnp)) throw new Error('To change password, current/new/confirm password are all required.');
        if (wantsPasswordChange && np!==cnp) throw new Error('New password and confirmation do not match.');

        progress.update(22, 'Saving account/profile updates...');
        const accountBody={};
        ['email','first_name','last_name','display_name','username'].forEach((k)=>{
          const value = document.getElementById(k).value;
          if (value !== initialFormState[k]) accountBody[k] = value;
        });
        if (Object.keys(accountBody).length) {
          const s=await fetch('/api/account/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(accountBody)});
          const sd=await s.json();if(!s.ok) throw new Error(sd.error||'Account settings save failed');
        }

        const avatarFile=document.getElementById('avatar_file').files[0];
        if(avatarFile){
          progress.update(40, 'Uploading profile avatar...');
          const fd=new FormData(); fd.append('avatar',avatarFile);
          const uploadRes=await fetch('/api/account/avatar',{method:'POST',body:fd});
          const uploadData=await uploadRes.json(); if(!uploadRes.ok) throw new Error(uploadData.error||'Avatar upload failed');
        }

        const logoFile=document.getElementById('branding_logo_file').files[0];
        if(logoFile){
          progress.update(58, 'Uploading branding logo...');
          const fd=new FormData(); fd.append('logo',logoFile);
          const logoRes=await fetch('/api/branding/logo',{method:'POST',body:fd});
          const logoData=await logoRes.json(); if(!logoRes.ok) throw new Error(logoData.error||'Logo upload failed');
        }

        const brandingBody={};
        const brandingNext={
          brand_name:document.getElementById('branding_brand_name').value,
          primary_color:document.getElementById('branding_primary_color').value,
          dark_primary_color:document.getElementById('branding_dark_primary_color').value,
          accent_color:document.getElementById('branding_accent_color').value,
          text_on_primary:document.getElementById('branding_text_on_primary').value
        };
        Object.keys(brandingNext).forEach((k)=>{ if (brandingNext[k] !== initialBrandingState[k]) brandingBody[k] = brandingNext[k]; });
        if (Object.keys(brandingBody).length) {
          progress.update(72, 'Saving branding settings...');
          const bs=await fetch('/api/branding/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(brandingBody)});
          const bsd=await bs.json(); if(!bs.ok) throw new Error(bsd.error||'Branding save failed');
        }
        if(wantsPasswordChange){
          progress.update(84, 'Updating password...');
          const p=await fetch('/api/account/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:cp,new_password:np,confirm_password:cnp})});
          const pd=await p.json(); if(!p.ok) throw new Error(pd.error||'Password update failed');
        }
        progress.update(95, 'Refreshing synchronized profile data...');
        await load();
        msg('Settings updated successfully and synchronized.');
        ['current_password','new_password','confirm_password','avatar_file','branding_logo_file'].forEach(id=>{const el=document.getElementById(id); if(el) el.value='';});
        });
      }catch(e){msg(e.message,true);}
    });
    load().catch(()=>msg('Failed to load settings',true));
  </script>
</body>
</html>
